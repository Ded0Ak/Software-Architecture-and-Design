<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Замовлення</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
  <div class="max-w-5xl mx-auto p-6">
    <h1 class="text-2xl font-bold mb-4">Замовлення</h1>
    <a href="index.html" class="text-blue-600 underline">← На головну</a>

    <div id="errorBox" class="hidden mt-4 p-3 bg-red-100 text-red-700 rounded"></div>
    <div id="successBox" class="hidden mt-2 p-3 bg-green-100 text-green-700 rounded"></div>

    <div class="mt-6">
      <h2 class="text-xl font-semibold mb-2">Створити / Редагувати</h2>
      <div class="grid grid-cols-1 md:grid-cols-5 gap-2">
        <input id="orderId" class="border p-2" placeholder="ID (для редагування)" type="number" />
        <input id="clientName" class="border p-2" placeholder="Ім'я клієнта" />
        <select id="orderType" class="border p-2">
          <option value="FromCatalog">З каталогу</option>
          <option value="Turnkey">Під ключ</option>
        </select>
        <input id="serviceIds" class="border p-2" placeholder="ID послуг (через кому)" />
        <input id="totalPrice" class="border p-2" placeholder="Сума (для Turnkey)" type="number" />
      </div>
      <div class="mt-2 flex gap-2">
        <button id="addCatalogBtn" class="bg-blue-600 text-white p-2">Створити</button>
        <button id="updateBtn" class="bg-yellow-600 text-white p-2">Оновити по ID</button>
      </div>
    </div>

    <div class="mt-8">
      <h2 class="text-xl font-semibold mb-2">Доступні послуги</h2>
      <table class="w-full bg-white shadow rounded">
        <thead>
          <tr class="bg-gray-100 text-left">
            <th class="p-2">ID</th>
            <th class="p-2">Назва</th>
            <th class="p-2">Ціна</th>
            <th class="p-2">Тип</th>
          </tr>
        </thead>
        <tbody id="servicesListTable"></tbody>
      </table>
    </div>

    <div class="mt-8">
      <h2 class="text-xl font-semibold mb-2">Список замовлень</h2>
      <table class="w-full bg-white shadow rounded">
        <thead>
          <tr class="bg-gray-100 text-left">
            <th class="p-2">ID</th>
            <th class="p-2">Клієнт</th>
            <th class="p-2">Тип</th>
            <th class="p-2">Сума</th>
            <th class="p-2">Виконано</th>
            <th class="p-2">Дії</th>
          </tr>
        </thead>
        <tbody id="ordersTable"></tbody>
      </table>
    </div>
  </div>
  <script src="js/common.js"></script>
  <script src="js/orders.js"></script>
</body>
</html>
